defaults:
  config: configs/policy_mech_interp.yaml
  prompt_config: configs/policy_text_prompt_sensitivity.yaml
  label_variant_config: configs/policy_label_variants.yaml
  manifest_root: data/processed/public_values
  site: resid_post
  split: test
  max_samples: 100
  random_sets: 100
  k_values: [1, 3, 5]
  prompt_template_keys:
    [proxy_forced_choice_template, proxy_forced_choice_template_compact, proxy_forced_choice_template_evidence_first]
  label_normalizations: [sum, mean_token, mean_char]

jobs:
  - family: equality_neutrality
    proxy_slug: risk_factors_bias
    paired_proxy_slug: harms_discrimination
    layer: 24
    feature_ids: [5081, 261, 4387, 1802, 108]
  - family: equality_neutrality
    proxy_slug: harms_discrimination
    paired_proxy_slug: risk_factors_bias
    layer: 20
    feature_ids: [549, 8450, 9768, 2819, 10931]
  - family: individual_rights
    proxy_slug: risk_factors_privacy
    paired_proxy_slug: harms_violation_of_civil_or_human_rights_including_privacy
    layer: 24
    feature_ids: [245, 11529, 261, 1802, 5081]
  - family: individual_rights
    proxy_slug: harms_violation_of_civil_or_human_rights_including_privacy
    paired_proxy_slug: risk_factors_privacy
    layer: 16
    feature_ids: [2889, 14597, 463, 9450, 1033]
