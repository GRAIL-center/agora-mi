benchmark_name: Policy Feature Governance Audit Benchmark
benchmark_id: policy_feature_benchmark
output_root: results/policy_feature_benchmark
manifest_root: data/processed/public_values
policy_config: configs/policy_mech_interp.yaml
manifest_summary_path: data/processed/public_values/summary.json
splits:
  train: train
  dev: dev
  test: test
methods:
  lexical_tfidf_logreg:
    enabled: false
    description: Shallow lexical baseline using TF-IDF with logistic regression.
  semantic_sentence_embed_logreg:
    enabled: false
    description: Semantic baseline using sentence embeddings with logistic regression.
    embedding_model: sentence-transformers/all-MiniLM-L6-v2
    batch_size: 32
  dense_residual_logreg:
    enabled: false
    description: Dense internal baseline using pooled residual activations with logistic
      regression.
    candidate_layers:
    - 12
    - 16
    - 20
    - 24
    site: resid_post
    pooling: mean
    robustness_pooling: max
    inner_valid_ratio: 0.2
    inner_seed: 13
  sparse_sae_feature_bank:
    enabled: true
    description: Mechanistic sparse baseline using train-selected SAE feature banks.
    candidate_layers:
    - 12
    - 16
    - 20
    - 24
    site: resid_post
    pooling: mean
    robustness_pooling: max
    inner_valid_ratio: 0.2
    inner_seed: 13
    topk: 64
scoring:
  core_axes:
  - coverage
  - consistency
  - robustness
  core_weights:
    coverage: 0.3333333333
    consistency: 0.3333333333
    robustness: 0.3333333333
  robustness_clip:
    min: 0.0
    max: 1.0
statistical_testing:
  paired_bootstrap_confidence: 0.95
  paired_bootstrap_iterations: 2000
  paired_bootstrap_seed: 0
  coverage_test_family: paired_bootstrap_auc
  robustness_test_family: paired_bootstrap_auc
  discovery_test_family: document_cluster_permutation
  discovery_multiple_comparison: benjamini_hochberg_fdr
  transfer_test_family: paired_bootstrap_auc
  causality_test_family: matched_random_control_margin_drop
preflight:
  reference_split_counts:
    train: 1965
    dev: 445
    test: 309
  reference_validated_split_counts:
    train: 403
    dev: 106
    test: 52
  reference_test_positive_counts:
    risk_factors_bias: 43
    harms_discrimination: 40
    risk_factors_privacy: 28
    harms_violation_of_civil_or_human_rights_including_privacy: 51
    risk_factors_transparency: 47
    risk_factors_interpretability_and_explainability: 6
  require_validated_reruns: true
  require_negative_files: true
  require_exact_task_set: true
paper:
  headline_method: sparse_sae_feature_bank
  baseline_method: lexical_tfidf_logreg
  appendix_on_preflight_failure: true
  pair_gap_aggregation: mean
  primary_comparisons:
  - within_pair_transfer
  - masking_delta
  - intervention_selectivity
  exploratory_comparisons:
  - layerwise_profiles
  - family_overlap_visualizations
  success_criteria:
    require_headline_top_core: true
    min_axes_beating_baseline: 2
    min_pairs_positive_consistency_gap: 2
    min_pairs_robustness_beating_baseline: 2
    min_positive_causality_families: 1
causality:
  enabled_method: sparse_sae_feature_bank
  families:
  - equality_neutrality
  - individual_rights
  - transparency_accountability
  mode: ablate
  alpha: 0.2
  split: test
  max_samples: 100
  min_proxy_support: 2
  min_bootstrap_stability: 0.25
validated_only:
  enabled: true
masking:
  keyword_source: proxy
  strategy: keyword_mask
v1_pairs:
- family: equality_neutrality
  left:
    proxy_name: 'Risk factors: Bias'
    proxy_slug: risk_factors_bias
    display_name: Bias
  right:
    proxy_name: 'Harms: Discrimination'
    proxy_slug: harms_discrimination
    display_name: Discrimination
- family: individual_rights
  left:
    proxy_name: 'Risk factors: Privacy'
    proxy_slug: risk_factors_privacy
    display_name: Privacy
  right:
    proxy_name: 'Harms: Violation of civil or human rights, including privacy'
    proxy_slug: harms_violation_of_civil_or_human_rights_including_privacy
    display_name: Rights violation
- family: transparency_accountability
  left:
    proxy_name: 'Risk factors: Transparency'
    proxy_slug: risk_factors_transparency
    display_name: Transparency
  right:
    proxy_name: 'Risk factors: Interpretability and explainability'
    proxy_slug: risk_factors_interpretability_and_explainability
    display_name: Interpretability
