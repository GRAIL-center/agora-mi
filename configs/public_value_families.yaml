version: 1

quality_filters:
  require_ai_related: true
  require_operative: true
  prefer_annotated: true
  robustness_validated_only: true
  min_text_chars: 200
  max_text_chars: 4000

selection:
  min_annotated_positives_main_proxy: 70
  min_validated_positives_main_proxy: 15
  prefer_multi_proxy_families: true
  demote_ambiguous_proxies: true

families:
  sustainability:
    label: Sustainability
    status: main
    description: Value family centered on long term safe and reliable operation and environmental stewardship.
    main_proxies:
      - "Risk factors: Safety"
      - "Risk factors: Reliability"
    secondary_proxies:
      - "Harms: Ecological harm"
    excluded_proxies:
      - "Harms: Harm to infrastructure"

  individual_rights:
    label: Protection of individual rights
    status: main
    description: Value family centered on protecting rights, liberties, and privacy interests.
    main_proxies:
      - "Risk factors: Security"
      - "Risk factors: Privacy"
      - "Harms: Violation of civil or human rights, including privacy"
    secondary_proxies:
      - "Risk factors: Bias"
    excluded_proxies: []

  transparency_accountability:
    label: Transparency and accountability
    status: main
    description: Value family centered on intelligibility, openness, and accountable visibility into AI systems.
    main_proxies:
      - "Risk factors: Transparency"
    secondary_proxies:
      - "Risk factors: Interpretability and explainability"
    excluded_proxies: []

  equality_neutrality:
    label: Equality and neutrality
    status: main
    description: Value family centered on equal treatment, non discrimination, and neutrality.
    main_proxies:
      - "Risk factors: Bias"
      - "Harms: Discrimination"
    secondary_proxies:
      - "Harms: Violation of civil or human rights, including privacy"
    excluded_proxies: []

  common_good:
    label: Common good
    status: exploratory
    description: Broad social welfare family with diffuse harm based proxies.
    main_proxies:
      - "Risk factors: Safety"
      - "Harms: Harm to health/safety"
      - "Harms: Financial loss"
      - "Harms: Harm to property"
      - "Harms: Harm to infrastructure"
      - "Harms: Ecological harm"
      - "Harms: Violation of civil or human rights, including privacy"
      - "Harms: Detrimental content"
    secondary_proxies: []
    excluded_proxies: []

  human_dignity:
    label: Human dignity
    status: exploratory
    description: Dignity related family spanning privacy, discrimination, and harmful content.
    main_proxies:
      - "Risk factors: Privacy"
      - "Risk factors: Bias"
      - "Harms: Violation of civil or human rights, including privacy"
      - "Harms: Detrimental content"
    secondary_proxies: []
    excluded_proxies: []

  effectiveness_reliability:
    label: Effectiveness and reliability
    status: exploratory
    description: Intraorganizational performance family with limited direct proxy diversity.
    main_proxies:
      - "Risk factors: Reliability"
    secondary_proxies: []
    excluded_proxies: []

governance_strategy_categories:
  regulation_and_enforcement:
    label: Regulation and Enforcement
    strategies:
      - "Strategies: Governance development"
      - "Strategies: Performance requirements"
      - "Strategies: Licensing, registration, and certification"
      - "Strategies: Tiering"
      - "Strategies: Evaluation"
      - "Strategies: Disclosure"

  direct_services_and_public_projects:
    label: Direct Services and Public Projects
    strategies:
      - "Strategies: Government support"
      - "Strategies: Pilots and testbeds"

  information_and_capacity_building:
    label: Information and Capacity Building
    strategies:
      - "Strategies: Government study or report"
      - "Strategies: New institution"
      - "Strategies: Convening"
