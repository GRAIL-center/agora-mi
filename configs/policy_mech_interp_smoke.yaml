model_id: "google/gemma-2-2b"
device: "cuda"
dtype: "bfloat16"
batch_size: 2
max_length: 512
seed: 0
layers: [12]
sites: ["resid_post"]
pooling: "mean"
robustness_pooling: "max"

sae_release: "gemma-scope-2b-pt-res-canonical"
sae_id_template: "layer_{L}/width_16k/canonical"

topk: 16
delta_thresh: null

bootstrap_B: 8
perm_N: 32
fdr_q: 0.05

processed_dir: "data/processed/public_values"
results_dir: "results/policy_mech_interp_smoke"
logs_dir: "logs"

prompt_config: "configs/policy_text_prompt.yaml"
use_chat_template: false

matching:
  method: "sentence"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 16

discovery:
  discovery_split: "train"
  evaluation_split: "test"
  bootstrap_min_frequency: 0.25
  use_fdr_survivors_first: true
