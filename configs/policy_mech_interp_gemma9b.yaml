model_id: "google/gemma-2-9b"
device: "cuda"
dtype: "bfloat16"
batch_size: 2
max_length: 1024
seed: 0
layers: [20, 24, 30, 36, 40]
sites: ["resid_post"]
pooling: "mean"
robustness_pooling: "max"

sae_release: "gemma-scope-9b-pt-res-canonical"
sae_id_template: "layer_{L}/width_16k/canonical"

topk: 64
delta_thresh: null

bootstrap_B: 500
perm_N: 2000
fdr_q: 0.05

processed_dir: "data/processed/public_values"
results_dir: "results/policy_mech_interp_gemma9b"
logs_dir: "logs"

prompt_config: "configs/policy_text_prompt.yaml"
use_chat_template: false

matching:
  method: "sentence"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 32

discovery:
  discovery_split: "train"
  evaluation_split: "test"
  bootstrap_min_frequency: 0.25
  use_fdr_survivors_first: true
